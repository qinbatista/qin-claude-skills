<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">qin-claude-skills adaptive workflow</title>
  <desc id="desc">Global skills use a compact adaptive quality route for ordinary production, cost-admitted graphs for large independent sources, and a separate post-result Ending task.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#17223d"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2dd4bf"/><stop offset=".5" stop-color="#60a5fa"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
  </defs>
  <rect width="1600" height="960" rx="32" fill="url(#bg)"/>
  <g font-family="Inter,Arial,sans-serif">
    <text x="74" y="116" fill="#f8fafc" font-size="72" font-weight="800">qin-claude-skills</text>
    <rect x="74" y="142" width="860" height="6" rx="3" fill="url(#line)"/>
    <text x="74" y="198" fill="#cbd5e1" font-size="28">Tiny bootstrap first. Prompt work always loads Prompt.</text>
    <g font-size="18" font-weight="700">
      <rect x="74" y="232" width="350" height="52" rx="26" fill="#0d2e35" stroke="#2dd4bf"/><text x="249" y="265" text-anchor="middle" fill="#99f6e4">⚡ ordinary Auto selects pair</text>
      <rect x="444" y="232" width="350" height="52" rx="26" fill="#122844" stroke="#60a5fa"/><text x="619" y="265" text-anchor="middle" fill="#bfdbfe">📣 result first, Real after</text>
      <rect x="814" y="232" width="430" height="52" rx="26" fill="#2b1c42" stroke="#c084fc"/><text x="1029" y="265" text-anchor="middle" fill="#e9d5ff">📉 graph only after cost admission</text>
      <rect x="1264" y="232" width="262" height="52" rx="26" fill="#3b1c2a" stroke="#fb7185"/><text x="1395" y="265" text-anchor="middle" fill="#fecdd3">🪝 hook optional</text>
    </g>
    <g>
      <rect x="74" y="326" width="450" height="160" rx="22" fill="#0d2e35" stroke="#2dd4bf" stroke-width="2"/><text x="104" y="368" fill="#99f6e4" font-size="18" font-weight="800">01 · ROUTE WHEN ADMITTED</text><text x="104" y="412" fill="#f8fafc" font-size="30" font-weight="700">🧭 Task Analyze</text><text x="104" y="452" fill="#cbd5e1" font-size="21">performance gate · model experience</text>
      <rect x="574" y="326" width="450" height="160" rx="22" fill="#122844" stroke="#60a5fa" stroke-width="2"/><text x="604" y="368" fill="#bfdbfe" font-size="18" font-weight="800">02 · EXECUTE LOCKED GRAPH</text><text x="604" y="412" fill="#f8fafc" font-size="30" font-weight="700">🗺️ Workflow</text><text x="604" y="452" fill="#cbd5e1" font-size="21">dependencies · handoff · Ending</text>
      <rect x="1074" y="326" width="450" height="160" rx="22" fill="#3b1f46" stroke="#e879f9" stroke-width="2"/><text x="1104" y="368" fill="#f5d0fe" font-size="18" font-weight="800">03 · 100% GLOBAL PROMPT GATE</text><text x="1104" y="412" fill="#f8fafc" font-size="30" font-weight="700">✍️ Prompt</text><text x="1104" y="446" fill="#f5d0fe" font-size="19">reusable prompts always trigger</text><text x="1104" y="472" fill="#cbd5e1" font-size="19">ordinary prose excluded</text>
      <rect x="74" y="516" width="450" height="160" rx="22" fill="#302716" stroke="#fbbf24" stroke-width="2"/><text x="104" y="558" fill="#fde68a" font-size="18" font-weight="800">04 · EXTENSIBLE DOMAINS</text><text x="104" y="602" fill="#f8fafc" font-size="30" font-weight="700">💻 Code</text><text x="104" y="642" fill="#cbd5e1" font-size="21">Python · C# · Unity C# · more</text>
      <rect x="574" y="516" width="450" height="160" rx="22" fill="#162d28" stroke="#34d399" stroke-width="2"/><text x="604" y="558" fill="#a7f3d0" font-size="18" font-weight="800">05 · POST-RESULT PROOF</text><text x="604" y="602" fill="#f8fafc" font-size="30" font-weight="700">🧪 Verify</text><text x="604" y="642" fill="#cbd5e1" font-size="21">Ending Real · independent evidence</text>
      <rect x="1074" y="516" width="450" height="160" rx="22" fill="#2b1c42" stroke="#c084fc" stroke-width="2"/><text x="1104" y="558" fill="#e9d5ff" font-size="18" font-weight="800">06 · REUSE STABLE WORK</text><text x="1104" y="602" fill="#f8fafc" font-size="30" font-weight="700">⚡ Optimization</text><text x="1104" y="642" fill="#cbd5e1" font-size="21">scripts · references · templates</text>
      <rect x="74" y="706" width="1450" height="124" rx="22" fill="#3b1c2a" stroke="#fb7185" stroke-width="2"/><text x="104" y="748" fill="#fecdd3" font-size="18" font-weight="800">07 · PRIVATE + SAFE</text><text x="104" y="792" fill="#f8fafc" font-size="30" font-weight="700">🔐 Management</text><text x="470" y="792" fill="#cbd5e1" font-size="21">experience · profiles · nine-skill public mirror</text>
    </g>
    <rect x="74" y="862" width="1450" height="54" rx="27" fill="#111d32" stroke="#475569"/>
    <text x="799" y="896" text-anchor="middle" fill="#dbeafe" font-size="21" font-weight="700">Finish task → show completed result → Ending Real → learn only from verified outcomes</text>
  </g>
</svg>
