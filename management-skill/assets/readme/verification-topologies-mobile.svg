<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 600 980">
  <title id="title">Result-first and Ending Real mobile diagram</title>
  <desc id="desc">Mobile diagram showing the completed result presented immediately, then Ending Real Verify updating the same producer, freezing unchanged profiles, and reopening verified failures.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#64748b"/></marker></defs>
  <rect width="600" height="980" rx="36" fill="#07111f"/>
  <text x="300" y="62" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="37" font-weight="700">Verification placement</text>
  <g font-family="Arial, sans-serif">
    <text x="55" y="118" fill="#94a3b8" font-size="22" font-weight="700">Result-bearing topology</text>
    <rect x="65" y="144" width="470" height="88" rx="20" fill="#1e3a8a"/><text x="300" y="180" text-anchor="middle" fill="#dbeafe" font-size="25" font-weight="700">Sequential · parallel · mixed work</text><text x="300" y="212" text-anchor="middle" fill="#eff6ff" font-size="17">branch checks only when merge cannot expose failure</text>
    <line x1="300" y1="232" x2="300" y2="276" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="65" y="284" width="470" height="112" rx="22" fill="#6d28d9"/><text x="300" y="329" text-anchor="middle" fill="#ede9fe" font-size="29" font-weight="700">Completed result</text><text x="300" y="366" text-anchor="middle" fill="#f5f3ff" font-size="21">requested work is done</text>
    <line x1="300" y1="396" x2="300" y2="440" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="65" y="448" width="470" height="112" rx="22" fill="#166534"/><text x="300" y="493" text-anchor="middle" fill="#dcfce7" font-size="28" font-weight="700">📣 Present result now</text><text x="300" y="530" text-anchor="middle" fill="#f0fdf4" font-size="19">first-result stops · no foreground verifier</text>
    <line x1="300" y1="560" x2="300" y2="604" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="65" y="612" width="470" height="276" rx="24" fill="#334155"/><text x="300" y="658" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">Background Ending Task</text><text x="88" y="708" fill="#e2e8f0" font-size="21">Ending Real updates the same producer</text><text x="88" y="756" fill="#e2e8f0" font-size="20">freeze profile · persist best_pair</text><text x="88" y="804" fill="#e2e8f0" font-size="21">proof · reports · logs · docs</text><text x="88" y="852" fill="#fca5a5" font-size="20">Verified failure → notify + reopen</text>
    <text x="300" y="938" text-anchor="middle" fill="#c4b5fd" font-size="23" font-weight="700">Result first · Real proves afterward</text>
  </g>
</svg>
