<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Runtime model receipt</title>
  <desc id="desc">A receipt table compares requested and actual model and effort, tokens, elapsed time, the presented first-result boundary, post-result Ending work, and a like-for-like baseline.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#17223d"/></linearGradient></defs>
  <rect width="1600" height="1050" rx="30" fill="url(#bg)"/>
  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="70" y="88" fill="#f8fafc" font-size="46" font-weight="800">📟 Runtime receipt: prove the route actually ran</text>
    <text x="70" y="130" fill="#94a3b8" font-size="23">A workflow label is a plan. Requested-versus-resolved execution data is operational proof.</text>

    <rect x="70" y="180" width="1460" height="520" rx="22" fill="#0f1d32" stroke="#334155" stroke-width="2"/>
    <rect x="70" y="180" width="1460" height="72" rx="22" fill="#172554"/>
    <g fill="#c7d2fe" font-size="18" font-weight="800">
      <text x="100" y="225">NODE</text><text x="330" y="225">SKILL</text><text x="570" y="225">REQUESTED</text><text x="850" y="225">RESOLVED / EFFECTIVE</text><text x="1160" y="225">TOKENS</text><text x="1325" y="225">ELAPSED</text><text x="1460" y="225">STATUS</text>
    </g>
    <g stroke="#334155" stroke-width="1"><path d="M70 252 H1530 M70 362 H1530 M70 472 H1530 M70 582 H1530"/><path d="M300 180 V700 M540 180 V700 M820 180 V700 M1130 180 V700 M1300 180 V700 M1435 180 V700"/></g>
    <g font-size="17">
      <text x="100" y="305" fill="#f8fafc" font-weight="700">Admitted entry</text><text x="100" y="333" fill="#94a3b8">explicit route</text><text x="330" y="315" fill="#99f6e4">task-analyze-skill</text><text x="570" y="305" fill="#cbd5e1">[entry model]</text><text x="570" y="333" fill="#cbd5e1">[entry effort]</text><text x="850" y="305" fill="#cbd5e1">[resolved model]</text><text x="850" y="333" fill="#cbd5e1">[resolved effort]</text><text x="1160" y="315" fill="#f8fafc">${tokens}</text><text x="1325" y="315" fill="#f8fafc">${seconds}</text><text x="1460" y="315" fill="#86efac" font-weight="800">MATCH</text>
      <text x="100" y="415" fill="#f8fafc" font-weight="700">Main work</text><text x="330" y="415" fill="#bfdbfe">selected executor</text><text x="570" y="405" fill="#cbd5e1">[planned model]</text><text x="570" y="433" fill="#cbd5e1">[planned effort]</text><text x="850" y="405" fill="#cbd5e1">[effective model]</text><text x="850" y="433" fill="#cbd5e1">[resolved effort]</text><text x="1160" y="415" fill="#f8fafc">${tokens}</text><text x="1325" y="415" fill="#f8fafc">${seconds}</text><text x="1460" y="415" fill="#86efac" font-weight="800">MATCH</text>
      <text x="100" y="515" fill="#f8fafc" font-weight="700">Result presented</text><text x="100" y="543" fill="#94a3b8">foreground boundary</text><text x="330" y="525" fill="#a7f3d0">producer output</text><text x="570" y="515" fill="#cbd5e1">[effective model]</text><text x="570" y="543" fill="#cbd5e1">[resolved effort]</text><text x="850" y="525" fill="#cbd5e1">Ending excluded</text><text x="1160" y="525" fill="#f8fafc">${tokens}</text><text x="1325" y="525" fill="#f8fafc">${first ms}</text><text x="1460" y="525" fill="#86efac" font-weight="800">SHOWN</text>
      <text x="100" y="635" fill="#f8fafc" font-weight="700">Ending Real</text><text x="330" y="625" fill="#e9d5ff">verify / optimize</text><text x="330" y="653" fill="#94a3b8">records</text><text x="570" y="625" fill="#cbd5e1">[planned model]</text><text x="570" y="653" fill="#cbd5e1">[planned effort]</text><text x="850" y="625" fill="#cbd5e1">[effective model]</text><text x="850" y="653" fill="#cbd5e1">[resolved effort]</text><text x="1160" y="635" fill="#f8fafc">${tokens}</text><text x="1325" y="635" fill="#f8fafc">${ending time}</text><text x="1460" y="625" fill="#86efac" font-weight="800">PASS</text><text x="1460" y="653" fill="#fca5a5" font-weight="800">REOPEN</text>
    </g>

    <g font-size="18" font-weight="700">
      <rect x="70" y="745" width="265" height="54" rx="27" fill="#123227" stroke="#34d399"/><text x="202" y="779" text-anchor="middle" fill="#d1fae5">✅ model match</text>
      <rect x="355" y="745" width="265" height="54" rx="27" fill="#123227" stroke="#34d399"/><text x="487" y="779" text-anchor="middle" fill="#d1fae5">✅ effort match</text>
      <rect x="640" y="745" width="265" height="54" rx="27" fill="#302716" stroke="#fbbf24"/><text x="772" y="779" text-anchor="middle" fill="#fef3c7">🪙 tokens recorded</text>
      <rect x="925" y="745" width="265" height="54" rx="27" fill="#102b3d" stroke="#38bdf8"/><text x="1057" y="779" text-anchor="middle" fill="#e0f2fe">⏱️ elapsed recorded</text>
      <rect x="1210" y="745" width="320" height="54" rx="27" fill="#3b1c2a" stroke="#fb7185"/><text x="1370" y="779" text-anchor="middle" fill="#ffe4e6">🚨 mismatch = fail</text>
    </g>

    <rect x="70" y="845" width="1460" height="135" rx="22" fill="#111d32" stroke="#475569"/>
    <text x="105" y="887" fill="#bfdbfe" font-size="19" font-weight="800">LIKE-FOR-LIKE BASELINE</text>
    <text x="105" y="930" fill="#f8fafc" font-size="21">Designed route</text><text x="390" y="930" fill="#cbd5e1" font-size="20">${routed tokens}</text><text x="610" y="930" fill="#cbd5e1" font-size="20">${first-result time}</text>
    <text x="910" y="930" fill="#f8fafc" font-size="21">Entry-model leakage baseline</text><text x="1260" y="930" fill="#cbd5e1" font-size="20">${tokens}</text><text x="1400" y="930" fill="#cbd5e1" font-size="20">${time}</text>
    <text x="800" y="1020" text-anchor="middle" fill="#fbbf24" font-size="20" font-weight="700">Only identical task scope, prompts, inputs, topology, and acceptance criteria support a savings claim.</text>
  </g>
</svg>
