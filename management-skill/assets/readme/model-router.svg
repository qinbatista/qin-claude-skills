<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">Model and effort router</title>
  <desc id="desc">Task strategy selects a saved sonnet, opus, or fable quality pair. One verified pass retains it, two matched passes try one weaker rung, and quality failure upgrades one rung. Haiku is reserved for cost-admitted schedule branches.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#17223d"/></linearGradient></defs>
  <rect width="1600" height="1040" rx="30" fill="url(#bg)"/>
  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="70" y="92" fill="#f8fafc" font-size="48" font-weight="800">🤖 Model + effort router</text>
    <text x="70" y="136" fill="#94a3b8" font-size="24">Task strategy picks the contextual quality pair; receipt-valid outcomes move one rung at a time.</text>
    <rect x="70" y="180" width="1460" height="130" rx="22" fill="#0d2e35" stroke="#2dd4bf" stroke-width="2"/>
    <text x="105" y="222" fill="#99f6e4" font-size="18" font-weight="800" letter-spacing="1.5">ELIGIBLE PRODUCTION · CATALOG + OBSIDIAN</text>
    <text x="105" y="262" fill="#f8fafc" font-size="25" font-weight="700">Every eligible text/code task gets a receipt-backed adaptive producer.</text>
    <text x="105" y="292" fill="#cbd5e1" font-size="20">Published output returns now; Ending automatically learns PASS or FAIL from its receipt.</text>

    <g>
      <rect x="70" y="355" width="710" height="250" rx="24" fill="#302716" stroke="#fbbf24" stroke-width="2"/>
      <text x="105" y="405" fill="#fde68a" font-size="20" font-weight="800">SCHEDULE BRANCH ONLY · HAIKU</text><text x="105" y="450" fill="#f8fafc" font-size="27" font-weight="750">Cost-admitted fan-out</text><text x="105" y="492" fill="#cbd5e1" font-size="21">independent sources · pre-read cost gate</text><text x="105" y="526" fill="#cbd5e1" font-size="21">never overrides the contextual quality pair</text><rect x="105" y="550" width="610" height="36" rx="18" fill="#4a3717"/><text x="410" y="575" text-anchor="middle" fill="#fef3c7" font-size="17" font-weight="700">not an ordinary first attempt</text>
      <rect x="820" y="355" width="710" height="250" rx="24" fill="#123227" stroke="#34d399" stroke-width="2"/>
      <text x="855" y="405" fill="#a7f3d0" font-size="20" font-weight="800">QUALITY FLOOR · SONNET</text><text x="855" y="450" fill="#f8fafc" font-size="27" font-weight="750">Quality ladder starts here</text><text x="855" y="492" fill="#cbd5e1" font-size="21">bounded work · contextual fallback</text><text x="855" y="526" fill="#cbd5e1" font-size="21">all supported sonnet efforts first</text><rect x="855" y="550" width="610" height="36" rx="18" fill="#174936"/><text x="1160" y="575" text-anchor="middle" fill="#d1fae5" font-size="17" font-weight="700">sonnet|low → all sonnet efforts</text>
      <rect x="70" y="645" width="710" height="250" rx="24" fill="#102b3d" stroke="#38bdf8" stroke-width="2"/>
      <text x="105" y="695" fill="#bae6fd" font-size="20" font-weight="800">BALANCED TIER · OPUS</text><text x="105" y="740" fill="#f8fafc" font-size="27" font-weight="750">Balanced production</text><text x="105" y="782" fill="#cbd5e1" font-size="21">source-rich changes · repository work</text><text x="105" y="816" fill="#cbd5e1" font-size="21">after sonnet · before fable</text><rect x="105" y="840" width="610" height="36" rx="18" fill="#123b55"/><text x="410" y="865" text-anchor="middle" fill="#e0f2fe" font-size="17" font-weight="700">one verified effort/model rung at a time</text>
      <rect x="820" y="645" width="710" height="250" rx="24" fill="#201a3a" stroke="#a78bfa" stroke-width="2"/>
      <text x="855" y="695" fill="#ddd6fe" font-size="20" font-weight="800">SAVED FRONTIER · FABLE</text><text x="855" y="740" fill="#f8fafc" font-size="27" font-weight="750">Open-ended reasoning</text><text x="855" y="782" fill="#cbd5e1" font-size="21">ambiguous architecture · complex judgment</text><text x="855" y="816" fill="#cbd5e1" font-size="21">saved catalog quality ceiling</text><rect x="855" y="840" width="610" height="36" rx="18" fill="#312e58"/><text x="1160" y="865" text-anchor="middle" fill="#ede9fe" font-size="17" font-weight="700">explicit local update may replace this ceiling</text>
    </g>

    <rect x="70" y="935" width="1460" height="68" rx="20" fill="#111d32" stroke="#475569"/>
    <text x="105" y="977" fill="#f8fafc" font-size="21" font-weight="700">1 PASS retains · 2 matched PASS move down</text><text x="590" y="977" fill="#cbd5e1" font-size="20">quality failure moves up one rung</text><text x="1080" y="977" fill="#fbbf24" font-size="20" font-weight="700">A receipt—not a label—proves execution.</text>
  </g>
</svg>
