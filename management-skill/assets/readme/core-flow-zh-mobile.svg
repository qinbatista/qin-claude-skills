<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1040" viewBox="0 0 720 1040" role="img" aria-labelledby="title desc">
  <title id="title">Auto Best Model 移动端核心流程</title>
  <desc id="desc">先评分并完成 Claude Code 主任务，再为每个独立真实检查运行一个强制评分 Ending Task。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#14213a"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#64748b"/></marker>
  </defs>
  <rect width="720" height="1040" rx="28" fill="url(#background)"/>
  <text x="40" y="58" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="30" font-weight="700">先完成，再强制真实验证</text>
  <text x="40" y="88" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="17">每个独立检查都有自己的评分 Ending。</text>

  <path d="M360 180V210 M360 390V420 M360 652V682 M360 800V830" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="190" y="112" width="340" height="68" rx="28" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="360" y="154" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="23" font-weight="700">Claude Code 任务</text>

  <rect x="70" y="210" width="580" height="180" rx="22" fill="#102d35" stroke="#2dd4bf" stroke-width="2"/>
  <text x="98" y="246" fill="#99f6e4" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15" font-weight="700">1  任务策略</text>
  <rect x="98" y="266" width="248" height="92" rx="16" fill="#123a3f"/>
  <text x="118" y="300" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="18" font-weight="700">上下文质量档</text>
  <text x="118" y="330" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15">读取前路由</text>
  <rect x="374" y="266" width="248" height="92" rx="16" fill="#123a3f"/>
  <text x="394" y="300" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="18" font-weight="700">2–3 个 source？</text>
  <text x="394" y="330" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15">成本门路由</text>

  <rect x="70" y="420" width="580" height="232" rx="22" fill="#211b3d" stroke="#a78bfa" stroke-width="2"/>
  <text x="98" y="456" fill="#ddd6fe" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15" font-weight="700">2  执行</text>
  <rect x="98" y="478" width="524" height="64" rx="16" fill="#10372e" stroke="#34d399" stroke-width="2"/>
  <text x="120" y="505" fill="#a7f3d0" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="14" font-weight="700">普通任务</text>
  <text x="602" y="520" text-anchor="end" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="20" font-weight="700">自适应 Producer</text>
  <rect x="98" y="562" width="524" height="64" rx="16" fill="#172554"/>
  <text x="120" y="589" fill="#bfdbfe" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="14" font-weight="700">成本/图谱已准入</text>
  <text x="602" y="604" text-anchor="end" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="18" font-weight="700">锁定 Source Graph</text>

  <rect x="150" y="682" width="420" height="118" rx="22" fill="#102e2a" stroke="#34d399" stroke-width="2"/>
  <text x="360" y="722" text-anchor="middle" fill="#a7f3d0" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15" font-weight="700">3  主任务完成</text>
  <text x="360" y="762" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="23" font-weight="700">立即返回</text>

  <rect x="110" y="830" width="500" height="130" rx="22" fill="#2b1c42" stroke="#c084fc" stroke-width="2"/>
  <text x="360" y="870" text-anchor="middle" fill="#e9d5ff" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15" font-weight="700">4  强制 ENDING TASK(S)</text>
  <text x="360" y="908" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="22" font-weight="700">执行真实检查 · 全部 PASS</text>
  <text x="360" y="936" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="16">FAIL → Fix Task → 全新 Ending，最多 3 次。</text>

  <text x="360" y="1002" text-anchor="middle" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="16">评分 → 完成 → 返回 → 强制真实 Ending</text>
</svg>
