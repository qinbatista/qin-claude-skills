<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Auto Best Model 核心流程</title>
  <desc id="desc">先完成并返回 Claude Code 主任务，再启动独立且不阻塞的后台 Ending 审计。</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#14213a"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#64748b"/></marker>
  </defs>
  <rect width="1200" height="620" rx="28" fill="url(#background)"/>
  <text x="48" y="60" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="32" font-weight="700">先完成主任务，再后台验证</text>
  <text x="48" y="92" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="18">已完成的主结果绝不等待独立 Ending Task。</text>

  <path d="M174 266H218 M466 266H510 M790 266H830 M974 266H1014" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="40" y="212" width="134" height="108" rx="20" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
  <text x="107" y="252" text-anchor="middle" fill="#bfdbfe" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15" font-weight="700">开始</text>
  <text x="107" y="286" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="22" font-weight="700">Claude Code 任务</text>

  <rect x="218" y="152" width="248" height="228" rx="22" fill="#102d35" stroke="#2dd4bf" stroke-width="2"/>
  <text x="242" y="188" fill="#99f6e4" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15" font-weight="700">1  任务策略</text>
  <rect x="242" y="210" width="200" height="62" rx="14" fill="#123a3f"/>
  <text x="260" y="236" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="17" font-weight="700">上下文质量档</text>
  <text x="260" y="258" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="14">读取任务文件前路由</text>
  <rect x="242" y="286" width="200" height="62" rx="14" fill="#123a3f"/>
  <text x="260" y="312" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="17" font-weight="700">2–3 个 source？</text>
  <text x="260" y="334" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="14">成本门决定单/多会话</text>

  <rect x="510" y="132" width="280" height="268" rx="22" fill="#211b3d" stroke="#a78bfa" stroke-width="2"/>
  <text x="534" y="168" fill="#ddd6fe" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15" font-weight="700">2  执行</text>
  <rect x="534" y="190" width="232" height="82" rx="16" fill="#10372e" stroke="#34d399" stroke-width="2"/>
  <text x="552" y="221" fill="#a7f3d0" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="14" font-weight="700">普通任务</text>
  <text x="552" y="250" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="19" font-weight="700">自适应 Producer</text>
  <rect x="534" y="290" width="232" height="84" rx="16" fill="#172554"/>
  <text x="552" y="320" fill="#bfdbfe" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="14" font-weight="700">成本/图谱已准入</text>
  <text x="552" y="348" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="17" font-weight="700">锁定 Source Graph</text>

  <rect x="830" y="202" width="144" height="128" rx="20" fill="#102e2a" stroke="#34d399" stroke-width="2"/>
  <text x="902" y="244" text-anchor="middle" fill="#a7f3d0" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="15" font-weight="700">3  主任务完成</text>
  <text x="902" y="280" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="19" font-weight="700">立即返回</text>

  <rect x="1014" y="152" width="146" height="228" rx="22" fill="#2b1c42" stroke="#c084fc" stroke-width="2"/>
  <text x="1087" y="190" text-anchor="middle" fill="#e9d5ff" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="14" font-weight="700">4  独立后台</text>
  <text x="1087" y="228" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="17" font-weight="700">Ending Task</text>
  <text x="1087" y="254" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="14">只读审计</text>
  <line x1="1038" y1="276" x2="1136" y2="276" stroke="#6b4b88"/>
  <text x="1087" y="309" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="17" font-weight="700">文件已修改？</text>
  <text x="1087" y="335" text-anchor="middle" fill="#cbd5e1" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="14">记录验证结果</text>

  <rect x="90" y="458" width="1020" height="104" rx="22" fill="#0d2435" stroke="#334155"/>
  <text x="600" y="500" text-anchor="middle" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="23" font-weight="700">主任务：完成 → 检查 → 返回</text>
  <text x="600" y="536" text-anchor="middle" fill="#94a3b8" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif" font-size="17">然后另开后台 Ending Task，不等待。</text>
</svg>
