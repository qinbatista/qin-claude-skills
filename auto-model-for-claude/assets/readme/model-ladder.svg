<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 400" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="up" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/></marker>
    <marker id="down" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker>
    <marker id="right" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker>
  </defs>
  <rect x="0" y="0" width="980" height="400" rx="12" fill="#0f172a"/>
  <text x="490" y="34" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700">Model switching intervals — 20-rung ladder, cheapest first</text>

  <g text-anchor="middle" font-size="13">
    <g>
      <rect x="60" y="60" width="190" height="180" rx="10" fill="#064e3b" stroke="#10b981"/>
      <text x="155" y="84" fill="#6ee7b7" font-weight="700">haiku · $1/$5 per MTok</text>
      <text x="155" y="106" fill="#d1fae5" font-size="12">low → medium → high</text>
      <text x="155" y="124" fill="#d1fae5" font-size="12">→ xhigh → max</text>
      <text x="155" y="152" fill="#a7f3d0" font-size="11">rungs 1–5</text>
      <text x="155" y="176" fill="#6ee7b7" font-size="11" font-weight="600">cold start (easy) enters</text>
      <text x="155" y="192" fill="#6ee7b7" font-size="11" font-weight="600">here at haiku|low — the floor</text>
    </g>
    <g>
      <rect x="290" y="60" width="190" height="180" rx="10" fill="#1e3a8a" stroke="#3b82f6"/>
      <text x="385" y="84" fill="#93c5fd" font-weight="700">sonnet · $3/$15</text>
      <text x="385" y="106" fill="#dbeafe" font-size="12">low → medium → high</text>
      <text x="385" y="124" fill="#dbeafe" font-size="12">→ xhigh → max</text>
      <text x="385" y="152" fill="#bfdbfe" font-size="11">rungs 6–10</text>
      <text x="385" y="176" fill="#93c5fd" font-size="11" font-weight="600">cold start (complex)</text>
      <text x="385" y="192" fill="#93c5fd" font-size="11" font-weight="600">enters at sonnet|high</text>
    </g>
    <g>
      <rect x="520" y="60" width="190" height="180" rx="10" fill="#3b1e5e" stroke="#a855f7"/>
      <text x="615" y="84" fill="#d8b4fe" font-weight="700">opus · $5/$25</text>
      <text x="615" y="106" fill="#f3e8ff" font-size="12">low → medium → high</text>
      <text x="615" y="124" fill="#f3e8ff" font-size="12">→ xhigh → max</text>
      <text x="615" y="152" fill="#e9d5ff" font-size="11">rungs 11–15</text>
    </g>
    <g>
      <rect x="750" y="60" width="190" height="180" rx="10" fill="#5b1a1a" stroke="#f87171"/>
      <text x="845" y="84" fill="#fca5a5" font-weight="700">fable · $10/$50</text>
      <text x="845" y="106" fill="#fee2e2" font-size="12">low → medium → high</text>
      <text x="845" y="124" fill="#fee2e2" font-size="12">→ xhigh → max</text>
      <text x="845" y="152" fill="#fecaca" font-size="11">rungs 16–20</text>
      <text x="845" y="176" fill="#fca5a5" font-size="11" font-weight="600">fable|max is the ceiling:</text>
      <text x="845" y="192" fill="#fca5a5" font-size="11" font-weight="600">fail here → report, stop</text>
    </g>
  </g>

  <g stroke-width="2" fill="none">
    <line x1="250" y1="150" x2="286" y2="150" stroke="#ef4444" marker-end="url(#right)"/>
    <line x1="480" y1="150" x2="516" y2="150" stroke="#ef4444" marker-end="url(#right)"/>
    <line x1="710" y1="150" x2="746" y2="150" stroke="#ef4444" marker-end="url(#right)"/>
  </g>

  <g font-size="13">
    <line x1="120" y1="288" x2="160" y2="288" stroke="#10b981" stroke-width="3" marker-end="url(#down)"/>
    <text x="172" y="293" fill="#6ee7b7">pass → probe ONE rung cheaper (<tspan font-family="monospace">downgrade</tspan>) until the floor or a known fail</text>

    <line x1="120" y1="318" x2="160" y2="318" stroke="#f59e0b" stroke-width="3" marker-end="url(#up)"/>
    <text x="172" y="323" fill="#fcd34d">correctness fail → ONE rung up (<tspan font-family="monospace">upgrade</tspan>); untested gap between fail and pass → try the gap rung</text>

    <line x1="120" y1="348" x2="160" y2="348" stroke="#ef4444" stroke-width="3" marker-end="url(#right)"/>
    <text x="172" y="353" fill="#fca5a5">operational fail (agent errored) → jump to the NEXT MODEL (<tspan font-family="monospace">operational_fallback</tspan>)</text>

    <text x="120" y="383" fill="#93c5fd">🔒 fail and pass adjacent on the ladder → <tspan font-family="monospace">freeze</tspan> at the pass rung: the exact minimum working pair is now known and reused</text>
  </g>
</svg>
