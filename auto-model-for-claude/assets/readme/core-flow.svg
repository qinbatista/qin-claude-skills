<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 250" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowloop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="250" rx="12" fill="#0f172a"/>
  <text x="490" y="34" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="700">Auto Model for Claude — core flow</text>

  <g font-size="13" fill="#e2e8f0" text-anchor="middle">
    <rect x="24"  y="70" width="118" height="64" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="83" y="97" font-weight="600">Delegated</text><text x="83" y="115">task</text>

    <rect x="176" y="70" width="140" height="64" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="246" y="92" font-weight="600">Classify</text>
    <text x="246" y="110" font-size="11" fill="#94a3b8">task_type · module</text>
    <text x="246" y="124" font-size="11" fill="#94a3b8">file · complexity</text>

    <rect x="350" y="70" width="160" height="64" rx="8" fill="#134e4a" stroke="#14b8a6"/>
    <text x="430" y="92" font-weight="600">Recommend</text>
    <text x="430" y="110" font-size="11" fill="#99f6e4">boundary search</text>
    <text x="430" y="124" font-size="11" fill="#99f6e4">over the ledger</text>

    <rect x="544" y="70" width="160" height="64" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="624" y="92" font-weight="600">Delegate</text>
    <text x="624" y="110" font-size="11" fill="#94a3b8">Agent tool `model`</text>
    <text x="624" y="124" font-size="11" fill="#94a3b8">Workflow model+effort</text>

    <rect x="738" y="70" width="110" height="64" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="793" y="92" font-weight="600">Grade</text>
    <text x="793" y="110" font-size="11" fill="#94a3b8">objective test,</text>
    <text x="793" y="124" font-size="11" fill="#94a3b8">not self-report</text>

    <rect x="882" y="70" width="74" height="64" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="919" y="97" font-weight="600">Record</text>
    <text x="919" y="115" font-size="11" fill="#94a3b8">ledger</text>
  </g>

  <g stroke="#64748b" stroke-width="2" fill="none">
    <line x1="142" y1="102" x2="172" y2="102" marker-end="url(#arrow)"/>
    <line x1="316" y1="102" x2="346" y2="102" marker-end="url(#arrow)"/>
    <line x1="510" y1="102" x2="540" y2="102" marker-end="url(#arrow)"/>
    <line x1="704" y1="102" x2="734" y2="102" marker-end="url(#arrow)"/>
    <line x1="848" y1="102" x2="878" y2="102" marker-end="url(#arrow)"/>
  </g>

  <path d="M 919 138 L 919 192 L 430 192 L 430 142" stroke="#10b981" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrowloop)"/>
  <text x="674" y="212" text-anchor="middle" fill="#6ee7b7" font-size="12">next similar task reuses the proven pair, probes cheaper after a pass, escalates after a fail</text>

  <text x="490" y="238" text-anchor="middle" fill="#64748b" font-size="11">The PreToolUse hook makes step 4 automatic: any Agent call without an explicit model gets one injected from this flow.</text>
</svg>
